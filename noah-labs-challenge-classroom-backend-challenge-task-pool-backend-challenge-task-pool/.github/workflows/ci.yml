name: CI

on:
  push:
  pull_request:

jobs:
  fast:
    name: Lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: Mypy
        run: mypy src tests

      - name: Unit tests
        run: pytest tests/unit tests/typing -v

  db:
    name: PostgreSQL tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: taskpool
          POSTGRES_PASSWORD: taskpool
          POSTGRES_DB: taskpool
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taskpool -d taskpool"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TASKPOOL_TEST_DATABASE_URL: postgresql+psycopg://taskpool:taskpool@localhost:5432/taskpool
      DATABASE_URL: postgresql+psycopg://taskpool:taskpool@localhost:5432/taskpool
      LOG_FORMAT: console
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Full test suite
        run: pytest -v

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t taskpool:ci .
