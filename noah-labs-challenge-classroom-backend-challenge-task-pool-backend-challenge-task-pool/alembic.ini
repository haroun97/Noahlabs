[alembic]
script_location = migrations
prepend_sys_path = src
path_separator = os
# DSN is injected at runtime from settings (migrations/env.py). This is a
# harmless placeholder so alembic doesn't complain about a missing URL.
sqlalchemy.url = postgresql+psycopg://taskpool:taskpool@localhost:5432/taskpool

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
