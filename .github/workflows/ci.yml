name: CI

on:
  push:
  pull_request:

defaults:
  run:
    working-directory: noah-labs-challenge-classroom-backend-challenge-task-pool-backend-challenge-task-pool

jobs:
  fast:
    name: Lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: Mypy
        run: mypy src tests

      - name: Unit tests
        run: pytest tests/unit tests/typing -v

  db:
    name: PostgreSQL tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: taskpool
          POSTGRES_PASSWORD: taskpool
          POSTGRES_DB: taskpool
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taskpool -d taskpool"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TASKPOOL_TEST_DATABASE_URL: postgresql+psycopg://taskpool:taskpool@localhost:5432/taskpool
      DATABASE_URL: postgresql+psycopg://taskpool:taskpool@localhost:5432/taskpool
      LOG_FORMAT: console
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Full test suite
        run: pytest -v

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: noah-labs-challenge-classroom-backend-challenge-task-pool-backend-challenge-task-pool
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t taskpool:ci .

  frontend:
    name: Frontend lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: noah-labs-challenge-classroom-frontend-challenge-frontend-challenge
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: noah-labs-challenge-classroom-frontend-challenge-frontend-challenge/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
